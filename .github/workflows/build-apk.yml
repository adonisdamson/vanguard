name: Build & Release APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: 'stable'
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Write .env file
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nRAILWAY_API_URL=%s\n' \
            "${{ secrets.SUPABASE_URL }}" \
            "${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.RAILWAY_API_URL }}" > .env

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        run: |
          mkdir -p android/app
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/vanguard-release.keystore

      - name: Build release APK
        env:
          KEY_STORE_PATH: ${{ github.workspace }}/android/app/vanguard-release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --no-pub
          cp build/app/outputs/flutter-apk/app-release.apk Vanguard-NDC.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vanguard-NDC-release
          path: Vanguard-NDC.apk
          retention-days: 90

      - name: Update rolling GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Vanguard NDC — Latest Build"
          body: |
            ## Vanguard NDC Membership App

            **Download the APK below and install it on your Android phone.**

            > **How to install:**
            > 1. Download `Vanguard-NDC.apk`
            > 2. Open the file on your phone
            > 3. If prompted, allow "Install from unknown sources" in Settings
            > 4. Tap Install

            ---
            Built from commit `${{ github.sha }}` on `${{ github.ref_name }}`
          files: Vanguard-NDC.apk
          prerelease: false
          make_latest: true
