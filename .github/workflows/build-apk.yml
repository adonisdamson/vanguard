name: Build Android APK

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Build release APK (requires keystore secrets)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: 'stable'
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ runner.tool_cache }}/flutter
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Write .env file
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          RAILWAY_API_URL=${{ secrets.RAILWAY_API_URL }}
          EOF

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      # --- Debug APK (every push) ---
      - name: Build debug APK
        if: ${{ !inputs.release }}
        run: flutter build apk --debug --no-pub

      - name: Upload debug APK
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v4
        with:
          name: vanguard-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # --- Release APK (tag pushes or manual trigger with release=true) ---
      - name: Decode keystore
        if: ${{ inputs.release || startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/vanguard-release.keystore

      - name: Build release APK
        if: ${{ inputs.release || startsWith(github.ref, 'refs/tags/v') }}
        env:
          KEY_STORE_PATH: vanguard-release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --no-pub

      - name: Upload release APK
        if: ${{ inputs.release || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: vanguard-release-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
