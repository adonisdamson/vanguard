name: Vanguard — Build & Release APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Optional release notes for this build'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.38.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: 'stable'
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Write .env file
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nRAILWAY_API_URL=%s\n' \
            "${{ secrets.SUPABASE_URL }}" \
            "${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.RAILWAY_API_URL }}" > .env

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        run: |
          mkdir -p android/app
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/vanguard-release.keystore

      - name: Build release APK (arm64 — Android 10+)
        env:
          KEY_STORE_PATH: ${{ github.workspace }}/android/app/vanguard-release.keystore
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            --dart-define=APP_VERSION=1.0.${{ github.run_number }} \
            --dart-define=GIT_SHA=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE="$(date -u '+%d %b %Y')"
          cp build/app/outputs/flutter-apk/app-release.apk \
            Vanguard-NDC-v1.0.${{ github.run_number }}.apk
          cp build/app/outputs/flutter-apk/app-release.apk \
            vanguard-latest.apk

      - name: Collect build metadata
        id: meta
        run: |
          echo "apk_size=$(du -sh Vanguard-NDC-v1.0.${{ github.run_number }}.apk | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u '+%d %B %Y, %H:%M UTC')" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      # Delete all old APK assets from the 'latest' release so only the new build is downloadable
      - name: Delete old release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/latest \
            --jq '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            ASSET_IDS=$(gh api repos/${{ github.repository }}/releases/${RELEASE_ID}/assets \
              --jq '.[].id' 2>/dev/null || echo "")
            for ASSET_ID in $ASSET_IDS; do
              gh api --method DELETE repos/${{ github.repository }}/releases/assets/${ASSET_ID} \
                2>/dev/null && echo "Deleted asset ${ASSET_ID}" || true
            done
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vanguard-NDC-v1.0.${{ github.run_number }}
          path: Vanguard-NDC-v1.0.${{ github.run_number }}.apk
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Vanguard NDC — v1.0.${{ github.run_number }}"
          body: |
            # Vanguard NDC Membership App
            > NDC Tema West Constituency — Member Registration & Management

            ## How to install

            1. **Download** `Vanguard-NDC-v1.0.${{ github.run_number }}.apk` from the **Assets** section below
            2. Open the file on your Android phone
            3. If prompted, tap **Settings → Install unknown apps** and allow your file manager
            4. Tap **Install** — takes about 10 seconds
            5. Open **Vanguard** and sign in with your credentials

            ---

            ## What's in this build

            > ${{ github.event.inputs.release_notes != '' && github.event.inputs.release_notes || steps.meta.outputs.commit_msg }}

            ### App capabilities
            | Feature | Status |
            |---|---|
            | Role-based access (Personnel · Higher Authority · Admin) | ✅ |
            | Member registration with photo, GPS & offline queue | ✅ |
            | Review queue — approve / reject with audit trail | ✅ |
            | Member directory — live search, 283 polling stations | ✅ |
            | CSV & PDF export (Higher Authority + Admin) | ✅ |
            | Paginated streaming exports (100k+ member safe) | ✅ |
            | NDC brand illustrations on all empty & error states | ✅ |
            | Adaptive launcher icon — canopy green background | ✅ |
            | Accessibility — semantic labels, 48dp touch targets | ✅ |
            | Bootstrap endpoint for first-time admin setup | ✅ |

            ---

            ## Build info

            | Field | Value |
            |---|---|
            | Version | `1.0.${{ github.run_number }}` |
            | APK size | ${{ steps.meta.outputs.apk_size }} |
            | Commit | [`${{ steps.meta.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
            | Branch | `${{ github.ref_name }}` |
            | Built | ${{ steps.meta.outputs.build_date }} |

            ---

            > **Minimum Android:** 10 (API 29) &nbsp;·&nbsp; **Architecture:** arm64-v8a
            > Built specifically for modern Android phones — smaller APK, faster install.
            > This is the only current APK — previous builds have been removed.
          files: |
            Vanguard-NDC-v1.0.${{ github.run_number }}.apk
            vanguard-latest.apk
          prerelease: false
          make_latest: true
