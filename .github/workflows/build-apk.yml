name: Tema West — Build & Release APK

on:
  push:
    branches: [master, main, dev]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Optional release notes for this build'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.38.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: 'stable'
          cache: true

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Secret leak guard
        run: |
          # Fail the build immediately if any Flutter source file contains the
          # Supabase service_role key name or a raw JWT that looks like a long
          # eyJ… token (anon keys are fine; the service_role key must NEVER
          # appear in lib/).
          if grep -rn --include="*.dart" "service_role" lib/; then
            echo "::error::service_role key found in Flutter source — remove it before merging."
            exit 1
          fi
          # Catch accidentally committed long Bearer tokens / JWT strings.
          if grep -rEn --include="*.dart" 'eyJ[A-Za-z0-9_-]{40,}' lib/; then
            echo "::error::Raw JWT/token string detected in Flutter source — use --dart-define or .env."
            exit 1
          fi
          echo "Secret guard passed — no service_role key or raw tokens in lib/."

      - name: Resolve release channel
        id: channel
        run: |
          if [[ "${{ github.ref_name }}" == "master" || "${{ github.ref_name }}" == "main" ]]; then
            echo "tag=latest"                    >> "$GITHUB_OUTPUT"
            echo "apk_name=TemaWest-NDC-v1.0.${{ github.run_number }}.apk"  >> "$GITHUB_OUTPUT"
            echo "release_name=Tema West NDC — v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"              >> "$GITHUB_OUTPUT"
            echo "make_latest=true"              >> "$GITHUB_OUTPUT"
            echo "is_prod=true"                  >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-latest"                >> "$GITHUB_OUTPUT"
            echo "apk_name=TemaWest-NDC-DEV-v1.0.${{ github.run_number }}.apk" >> "$GITHUB_OUTPUT"
            echo "release_name=Tema West NDC — DEV v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"               >> "$GITHUB_OUTPUT"
            echo "make_latest=false"             >> "$GITHUB_OUTPUT"
            echo "is_prod=false"                 >> "$GITHUB_OUTPUT"
          fi

      - name: Write .env file
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nAPI_BASE_URL=%s\n' \
            "${{ secrets.SUPABASE_URL }}" \
            "${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.API_BASE_URL }}" > .env


      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        run: |
          mkdir -p android/app
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/vanguard-release.keystore

      - name: Build release APK (arm64 — Android 10+)
        env:
          KEY_STORE_PATH: ${{ github.workspace }}/android/app/vanguard-release.keystore
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            --dart-define=APP_VERSION=1.0.${{ github.run_number }} \
            --dart-define=GIT_SHA=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE="$(date -u '+%d %b %Y')"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "${{ steps.channel.outputs.apk_name }}"

      - name: Collect build metadata
        id: meta
        run: |
          echo "apk_size=$(du -sh '${{ steps.channel.outputs.apk_name }}' | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u '+%d %B %Y, %H:%M UTC')" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      # Recreate the release from scratch every build so publish date and the
      # single APK asset always reflect THIS exact build.
      # Each channel (prod → latest, dev → dev-latest) manages its own release
      # independently — they never touch each other.
      - name: Delete previous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ steps.channel.outputs.tag }}" --cleanup-tag --yes --repo ${{ github.repository }} || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.channel.outputs.apk_name }}
          path: ${{ steps.channel.outputs.apk_name }}
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          name: "${{ steps.channel.outputs.release_name }}"
          body: |
            # Tema West NDC Membership App
            > NDC Tema West Constituency — Member Registration & Management
            ${{ steps.channel.outputs.is_prod == 'false' && '> ⚠️ **DEV BUILD** — for testing only. The production APK is on the `latest` release.' || '' }}

            ## How to install

            1. **Download** `${{ steps.channel.outputs.apk_name }}` from the **Assets** section below
            2. Open the file on your Android phone
            3. If prompted, tap **Settings → Install unknown apps** and allow your file manager
            4. Tap **Install** — takes about 10 seconds
            5. Open **Tema West** and sign in with your credentials

            ---

            ## What's in this build

            > ${{ github.event.inputs.release_notes != '' && github.event.inputs.release_notes || steps.meta.outputs.commit_msg }}

            ### App capabilities
            | Feature | Status |
            |---|---|
            | Role-based access (Personnel · Higher Authority · Admin) | ✅ |
            | Member registration with photo, GPS & offline queue | ✅ |
            | Review queue — approve / reject with audit trail | ✅ |
            | Member directory — live search, 283 polling stations | ✅ |
            | CSV & PDF export (Higher Authority + Admin) | ✅ |
            | Paginated streaming exports (100k+ member safe) | ✅ |
            | NDC brand illustrations on all empty & error states | ✅ |
            | Adaptive launcher icon — canopy green background | ✅ |
            | Accessibility — semantic labels, 48dp touch targets | ✅ |
            | Bootstrap endpoint for first-time admin setup | ✅ |

            ---

            ## Build info

            | Field | Value |
            |---|---|
            | Version | `1.0.${{ github.run_number }}` |
            | Channel | `${{ github.ref_name }}` |
            | APK size | ${{ steps.meta.outputs.apk_size }} |
            | Commit | [`${{ steps.meta.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
            | Built | ${{ steps.meta.outputs.build_date }} |

            ---

            > **Minimum Android:** 10 (API 29) &nbsp;·&nbsp; **Architecture:** arm64-v8a
            > Built specifically for modern Android phones — smaller APK, faster install.
          files: |
            ${{ steps.channel.outputs.apk_name }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
