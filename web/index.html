<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="NDC Tema West Constituency — member registration & management.">
  <meta name="theme-color" content="#006B3F">

  <!-- iOS / mobile web-app -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TemaWest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TemaWest</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* NDC-green boot screen so the PWA never flashes blank white while
       Flutter initialises — matches the native splash (deep canopy green). */
    html, body { margin: 0; padding: 0; height: 100%; background: #0A3D2A; }
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 22px;
      background: #0A3D2A; z-index: 9999;
      transition: opacity .4s ease; font-family: system-ui, sans-serif;
    }
    #boot.hide { opacity: 0; pointer-events: none; }
    #boot .mark {
      color: #FFFFFF; font-size: 26px; font-weight: 800; letter-spacing: 3px;
    }
    #boot .sub { color: rgba(255,255,255,.62); font-size: 12px; letter-spacing: 1px; }
    #boot .ring {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.18); border-top-color: #FFFFFF;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PWA install banner ─────────────────────────────────────────────── */
    #pwa-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 8888;
      background: #0A3D2A; color: #fff;
      padding: 14px 16px 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      font-family: system-ui, sans-serif; font-size: 14px; line-height: 1.4;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.28);
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.22,.68,0,1.2);
    }
    #pwa-banner.show { transform: translateY(0); }
    #pwa-banner .pwa-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 10px; overflow: hidden;
    }
    #pwa-banner .pwa-icon img {
      width: 40px; height: 40px; object-fit: cover; display: block;
    }
    #pwa-banner .pwa-body { flex: 1; }
    #pwa-banner .pwa-title { font-weight: 700; font-size: 14px; color: #fff; }
    #pwa-banner .pwa-sub { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 2px; }
    #pwa-banner .pwa-actions { display: flex; gap: 8px; margin-top: 10px; }
    #pwa-banner .pwa-btn {
      padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; line-height: 1;
    }
    #pwa-banner .pwa-install { background: #FFFFFF; color: #006B3F; }
    #pwa-banner .pwa-dismiss { background: rgba(255,255,255,.12); color: #fff; }
    #pwa-banner .pwa-close {
      background: none; border: none; color: rgba(255,255,255,.5);
      font-size: 20px; line-height: 1; cursor: pointer; padding: 0 0 0 4px;
      flex-shrink: 0; align-self: flex-start; margin-top: -2px;
    }
    /* iOS share arrow hint */
    #pwa-ios-hint {
      display: none; margin-top: 8px; font-size: 12px;
      color: rgba(255,255,255,.75); line-height: 1.5;
    }
    #pwa-ios-hint.show { display: block; }
  </style>
</head>
<body>
  <div id="boot">
    <div class="ring"></div>
    <div class="mark">TEMA WEST</div>
    <div class="sub">NDC MEMBERSHIP</div>
  </div>

  <!-- PWA install banner (hidden until JS decides to show it) -->
  <div id="pwa-banner" role="dialog" aria-label="Install TemaWest app" style="display:none">
    <div class="pwa-icon"><img src="icons/Icon-192.png" alt="TemaWest"></div>
    <div class="pwa-body">
      <div class="pwa-title">Install TemaWest</div>
      <div class="pwa-sub" id="pwa-sub-text">Add to your home screen for the best experience.</div>
      <div id="pwa-ios-hint">
        Tap the <strong>Share</strong> button ⬆ in Safari,<br>
        then choose <strong>"Add to Home Screen"</strong>.
      </div>
      <div class="pwa-actions">
        <button class="pwa-btn pwa-install" id="pwa-install-btn">Install app</button>
        <button class="pwa-btn pwa-dismiss" id="pwa-dismiss-btn">Not now</button>
      </div>
    </div>
    <button class="pwa-close" id="pwa-close-btn" aria-label="Close">×</button>
  </div>

  <script>
    // Remove the boot screen once Flutter has painted the first frame.
    window.addEventListener('flutter-first-frame', function () {
      var b = document.getElementById('boot');
      if (b) { b.classList.add('hide'); setTimeout(function () { b.remove(); }, 450); }
    });

    // ── Reliable PWA updates ────────────────────────────────────────────────
    // Flutter's service worker serves main.dart.js cache-first, so a returning
    // user keeps running the OLD bundle after a deploy until every tab is
    // closed. That made shipped fixes "never show up" (e.g. member photos on
    // web). Here we: (1) poll for a new worker on load, (2) tell a freshly
    // installed worker to activate immediately (the generated SW handles the
    // 'skipWaiting' message), and (3) reload exactly once when it takes control
    // — so a new deploy lands on the very next visit, no manual cache-clearing.
    if ('serviceWorker' in navigator) {
      var __reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (__reloading) return;
        __reloading = true;
        window.location.reload();
      });
      navigator.serviceWorker.ready.then(function (reg) {
        function watch(worker) {
          if (!worker) return;
          worker.addEventListener('statechange', function () {
            // A new worker finished installing while an old one still controls
            // the page → a genuine update is waiting. Activate it now.
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              worker.postMessage('skipWaiting');
            }
          });
        }
        reg.addEventListener('updatefound', function () { watch(reg.installing); });
        try { reg.update(); } catch (e) {}
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // ── Smart PWA install prompt ─────────────────────────────────────────────
    // Detects platform and shows the right prompt:
    //   Android Chrome  → native beforeinstallprompt API
    //   iOS Safari      → guide overlay (no native API exists on iOS)
    //   Already standalone / dismissed → silent
    (function () {
      var DISMISS_KEY = 'pwa_install_dismissed';
      var banner   = document.getElementById('pwa-banner');
      var installBtn = document.getElementById('pwa-install-btn');
      var dismissBtn = document.getElementById('pwa-dismiss-btn');
      var closeBtn   = document.getElementById('pwa-close-btn');
      var subText    = document.getElementById('pwa-sub-text');
      var iosHint    = document.getElementById('pwa-ios-hint');
      if (!banner) return;

      // Already installed as standalone — never show the banner.
      var isStandalone = window.navigator.standalone === true ||
                         window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) return;

      // User previously dismissed — respect their choice for 7 days.
      var dismissed = localStorage.getItem(DISMISS_KEY);
      if (dismissed && Date.now() - parseInt(dismissed, 10) < 7 * 86400 * 1000) return;

      var ua = navigator.userAgent || '';
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      var isSafari = isIOS && /safari/i.test(ua) && !/crios|fxios|opios/i.test(ua);
      var isAndroid = /android/i.test(ua);

      var deferredPrompt = null; // Android: holds the native install event

      function showBanner() {
        banner.style.display = 'flex';
        // Animate in after a short delay so the Flutter first-frame lands first.
        setTimeout(function () { banner.classList.add('show'); }, 100);
      }

      function hideBanner(remember) {
        banner.classList.remove('show');
        setTimeout(function () { banner.style.display = 'none'; }, 380);
        if (remember) localStorage.setItem(DISMISS_KEY, Date.now().toString());
      }

      // Close / dismiss buttons.
      closeBtn.addEventListener('click',   function () { hideBanner(true); });
      dismissBtn.addEventListener('click', function () { hideBanner(true); });

      // ── Android Chrome path ────────────────────────────────────────────────
      if (isAndroid) {
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
          subText.textContent = 'Install the app for faster access — works offline too.';
          // Wait until after Flutter has painted so the banner doesn't race
          // with the boot screen.
          window.addEventListener('flutter-first-frame', function () {
            setTimeout(showBanner, 1500);
          }, { once: true });
          // Fallback in case the event fires before flutter-first-frame.
          setTimeout(function () {
            if (banner.style.display === 'none' || !banner.classList.contains('show')) {
              showBanner();
            }
          }, 4000);
        });

        window.addEventListener('appinstalled', function () {
          hideBanner(false);
          deferredPrompt = null;
        });

        installBtn.addEventListener('click', function () {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function (choice) {
            deferredPrompt = null;
            hideBanner(choice.outcome !== 'accepted');
          });
        });
      }

      // ── iOS Safari path ────────────────────────────────────────────────────
      // iOS has no install API — we guide the user to use the Share sheet.
      if (isSafari) {
        installBtn.textContent  = 'How to install';
        subText.textContent     = 'Add TemaWest to your home screen for the full app experience.';
        installBtn.addEventListener('click', function () {
          iosHint.classList.add('show');
          installBtn.style.display = 'none';
        });
        window.addEventListener('flutter-first-frame', function () {
          setTimeout(showBanner, 2000);
        }, { once: true });
      }
    })();
  </script>
</body>
</html>
