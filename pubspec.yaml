name: vanguard
description: NDC Membership Management App
publish_to: 'none'

version: 1.0.1+101

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.9.0

  # Firebase (core only — Google Sign-In deferred to a future release)

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^15.1.2

  # UI
  phosphor_flutter: ^2.1.0
  lottie: ^3.3.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  path_provider: ^2.1.5

  # Device
  connectivity_plus: ^6.1.0
  geolocator: ^14.0.3
  image_picker: ^1.1.2

  # Offline queue
  hive_flutter: ^1.1.0

  # Utils
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon_umbrella.png"
  adaptive_icon_background: "#006B3F"
  adaptive_icon_foreground: "assets/icon/app_icon_umbrella.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/illustrations/
    - assets/icon/
    - assets/images/ndc_flag.png
    - assets/images/ghana_flag.png
    - assets/images/ndc_umbrella.png
    - assets/images/ndc_strength.png
    - assets/images/login_hero.jpg
    - assets/images/splash_hero.jpg
