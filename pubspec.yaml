name: vanguard
description: NDC Membership Management App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.9.0

  # Firebase (Auth only)
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  google_sign_in: ^6.2.2

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^15.1.2

  # UI
  phosphor_flutter: ^2.1.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  path_provider: ^2.1.5

  # Device
  geolocator: ^14.0.3
  image_picker: ^1.1.2

  # Offline queue
  hive_flutter: ^1.1.0

  # Utils
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/placeholder.txt
    - assets/images/ndc_flag.png
    - assets/images/ghana_flag.png
    - assets/images/ndc_umbrella.png
